<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>The Pool | Snake Draft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --masters-green:#00592c;
    --masters-green-dark:#003d1e;
    --masters-gold:#c9a227;
    --masters-gold-light:#e3c876;
    --cream:#faf7ef;
    --cream-2:#f1ecdd;
    --ink:#1d2b1f;
    --ink-soft:#4a5a4c;
    --line:rgba(0,89,44,0.18);
    --danger:#7a2222;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'EB Garamond', Georgia, serif;
    font-size:17px;
    line-height:1.5;
    min-height:100vh;
    padding-bottom:3rem;
  }
  h1,h2,h3,.serif-head{
    font-family:'Playfair Display', Georgia, serif;
    font-weight:600;
    letter-spacing:0.01em;
  }
  header.top{
    background:linear-gradient(180deg, var(--masters-green) 0%, var(--masters-green-dark) 100%);
    color:var(--cream);
    padding:1.4rem 1.2rem 1.6rem;
    text-align:center;
    border-bottom:4px solid var(--masters-gold);
    position:relative;
  }
  header.top .eyebrow{
    font-family:'EB Garamond', serif;
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--masters-gold-light);
    margin:0 0 6px;
  }
  header.top h1{
    margin:0;
    font-size:26px;
    color:#fff;
  }
  header.top .sub{
    margin:6px 0 0;
    font-size:13px;
    color:rgba(255,255,255,0.75);
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 1rem;}
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:1rem 1.1rem;
    margin-bottom:0.9rem;
  }
  .leader-banner{
    background:var(--masters-green);
    color:#fff;
    border:1px solid var(--masters-gold);
    border-radius:6px;
    padding:0.9rem 1.1rem;
    margin:1rem 0;
  }
  .leader-banner .eyebrow{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--masters-gold-light);
    margin:0 0 4px;
  }
  .leader-banner .name{
    font-family:'Playfair Display', serif;
    font-size:20px;
    margin:0;
  }
  .leader-banner .meta{
    font-size:13px;
    color:rgba(255,255,255,0.85);
    margin:4px 0 0;
  }
  .leader-banner .owners{
    margin-top:8px;
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .leader-banner .owner-pill{
    background:rgba(255,255,255,0.14);
    border:1px solid var(--masters-gold);
    color:var(--masters-gold-light);
    font-size:12px;
    padding:3px 10px;
    border-radius:999px;
  }
  nav.tabs{
    display:flex;
    gap:6px;
    margin:1rem 0;
  }
  nav.tabs button{
    flex:1;
    font-family:'EB Garamond', serif;
    font-size:14px;
    padding:9px 4px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:5px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  nav.tabs button.active{
    background:var(--masters-green);
    color:#fff;
    border-color:var(--masters-green-dark);
    font-weight:600;
  }
  label.field-label{
    display:block;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  input[type=text],input[type=number]{
    width:100%;
    font-family:'EB Garamond', serif;
    font-size:16px;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:5px;
    background:var(--cream);
    color:var(--ink);
  }
  input:focus{outline:2px solid var(--masters-gold);outline-offset:0;}
  button.btn{
    font-family:'EB Garamond', serif;
    font-size:15px;
    padding:9px 14px;
    border-radius:5px;
    border:1px solid var(--masters-green);
    background:#fff;
    color:var(--masters-green);
    cursor:pointer;
  }
  button.btn:active{transform:scale(0.98);}
  button.btn.primary{
    background:var(--masters-green);
    color:#fff;
  }
  button.btn.gold{
    background:var(--masters-gold);
    border-color:var(--masters-gold);
    color:var(--masters-green-dark);
    font-weight:600;
  }
  button.btn.danger{
    border-color:var(--danger);
    color:var(--danger);
  }
  button.btn.full{width:100%;}
  .row-flex{display:flex;gap:8px;align-items:center;}
  .list-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:7px 2px;
    border-bottom:1px solid var(--line);
    font-size:15px;
  }
  .list-row:last-child{border-bottom:none;}
  .x-btn{
    background:none;border:none;color:var(--ink-soft);font-size:15px;cursor:pointer;padding:2px 6px;
  }
  .pick-card{
    background:var(--cream-2);
    border:1px solid var(--masters-gold);
    border-radius:6px;
    padding:0.9rem 1rem;
    margin-bottom:0.8rem;
  }
  .pick-card .eyebrow{
    font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 4px;
  }
  .pick-card .onclock{
    font-family:'Playfair Display',serif;
    font-size:19px;
    margin:0;
    color:var(--masters-green-dark);
  }
  .golfer-btn{
    display:block;
    width:100%;
    text-align:left;
    padding:8px 10px;
    margin-bottom:5px;
    border:1px solid var(--line);
    border-radius:5px;
    background:#fff;
    font-family:'EB Garamond',serif;
    font-size:15px;
    cursor:pointer;
  }
  .golfer-btn:active{background:var(--cream-2);}
  .roster-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:8px;
  }
  .roster-card{
    background:var(--cream-2);
    border-radius:5px;
    padding:8px 10px;
  }
  .roster-card .pname{
    font-family:'Playfair Display',serif;
    font-size:13px;
    margin:0 0 4px;
    color:var(--masters-green-dark);
  }
  .roster-card .gname{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:0;
  }
  .lb-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:0.85rem 1rem;
    margin-bottom:0.7rem;
    position:relative;
  }
  .lb-card.first{
    border:2px solid var(--masters-gold);
    background:linear-gradient(180deg,#fffdf6,#fff);
  }
  .lb-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .lb-rank{
    font-family:'Playfair Display',serif;
    font-size:16px;
    color:var(--masters-green-dark);
  }
  .lb-total{
    font-family:'Playfair Display',serif;
    font-size:19px;
    font-weight:600;
    color:var(--ink);
  }
  .lb-sub{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:5px 0 0;
  }
  .small-muted{
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .gscore-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    border-bottom:1px solid var(--line);
    padding:7px 2px;
    font-size:14.5px;
  }
  .gscore-row .sc{
    font-family:'Playfair Display',serif;
    font-weight:600;
    min-width:42px;
    text-align:right;
  }
  .live-tag{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    color:var(--masters-green);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;background:var(--masters-green);
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{0%{opacity:1;}50%{opacity:0.25;}100%{opacity:1;}}
  .footer-note{
    text-align:center;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:1.4rem;
  }
  .scrolly{max-height:300px;overflow-y:auto;}
  .config-banner{
    background:#fff3e0;
    border:1px solid #c98a1a;
    color:#5c3d0a;
    border-radius:6px;
    padding:0.9rem 1rem;
    font-size:14px;
    margin-bottom:1rem;
  }
  .config-banner code{
    background:rgba(0,0,0,0.06);
    padding:1px 5px;
    border-radius:3px;
    font-size:13px;
  }
  .sync-tag{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;
    text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);
    margin-bottom:0.6rem;
  }
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#2e7d32;}
  .sync-dot.off{background:#b0413e;}
</style>
</head>
<body>

<header class="top">
  <p class="eyebrow">A tradition unlike any other</p>
  <h1>The Pool</h1>
  <p class="sub">PGA Tour fantasy snake draft</p>
</header>

<div class="wrap">
  <div id="app"></div>
  <p class="footer-note">Scores pulled from ESPN's public PGA leaderboard. Not affiliated with the PGA Tour, Augusta National, or ESPN.</p>
</div>

<script>
(function(){
var STORAGE_KEY='masters_pool_v1';
var ROSTER_SIZE=10;
var NUM_PLAYERS=4;
var MAX_GOLFERS=150;
var ESPN_URL='https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard';
var REFRESH_MS=60000;

// ---- Fill these in from your Firebase project (see chat instructions) ----
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyA7GRfQx1cGixQat1jwPRHN7_7RYteg5kY",
  authDomain: "golf-pool-84d97.firebaseapp.com",
  databaseURL: "https://golf-pool-84d97-default-rtdb.firebaseio.com",
  projectId: "golf-pool-84d97"
};
var ROOM_ID = "default-pool";
// ---------------------------------------------------------------------------

var firebaseReady = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey.indexOf('YOUR_')!==0;
var dbRef=null;
var syncConnected=false;
var suppressNextWrite=false;

var state=null;
var liveScores={};
var liveTournamentName='';
var liveStatus='';
var liveFetchedAt=null;
var liveError=null;

function defaultState(){
  return { players:[], golfers:[], picks:[], view:'setup' };
}
function normalizeState(s){
  if(!s) s={};
  if(!Array.isArray(s.players)) s.players=[];
  if(!Array.isArray(s.golfers)) s.golfers=[];
  if(!Array.isArray(s.picks)) s.picks=[];
  if(!s.view) s.view='setup';
  return s;
}

function loadState(){
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(raw){ state=JSON.parse(raw); }
  }catch(e){}
  state=normalizeState(state);
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  if(firebaseReady && dbRef){
    suppressNextWrite=true;
    dbRef.set(state);
  }
}

function initFirebase(){
  if(!firebaseReady) return;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    var db=firebase.database();
    dbRef=db.ref('pools/'+ROOM_ID);
    dbRef.on('value', function(snap){
      syncConnected=true;
      var remote=snap.val();
      if(suppressNextWrite){
        suppressNextWrite=false;
        return;
      }
      if(remote){
        state=normalizeState(remote);
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
        render();
      } else {
        dbRef.set(state);
      }
    }, function(err){
      syncConnected=false;
      render();
    });
  }catch(e){
    firebaseReady=false;
  }
}

function normName(n){
  return (n||'').toLowerCase().replace(/[.\-']/g,'').replace(/\s+/g,' ').trim();
}

function el(tag,attrs,children){
  var e=document.createElement(tag);
  attrs=attrs||{};
  for(var k in attrs){
    if(k==='text') e.textContent=attrs[k];
    else if(k==='html') e.innerHTML=attrs[k];
    else e.setAttribute(k,attrs[k]);
  }
  (children||[]).forEach(function(c){ if(c) e.appendChild(c); });
  return e;
}
function btn(label,onClick,cls){
  var b=el('button',{type:'button',class:'btn '+(cls||'')});
  b.textContent=label;
  b.addEventListener('click',onClick);
  return b;
}

function snakeOrder(numPlayers, rounds){
  var order=[];
  for(var r=0;r<rounds;r++){
    var seq=[];
    for(var i=0;i<numPlayers;i++) seq.push(i);
    if(r%2===1) seq.reverse();
    order=order.concat(seq);
  }
  return order;
}

function draftedNames(){ return state.picks.map(function(p){ return p.golfer; }); }

function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  if(!firebaseReady){
    var warn=el('div',{class:'config-banner'});
    warn.innerHTML='Live sync isn\u2019t set up yet \u2014 this device is only saving to itself. Add your Firebase config in <code>index.html</code> (see setup steps) to make everyone see the same draft and scores.';
    app.appendChild(warn);
  } else {
    var tag=el('div',{class:'sync-tag'});
    tag.appendChild(el('span',{class:'sync-dot'+(syncConnected?'':' off')}));
    tag.appendChild(document.createTextNode(syncConnected? ' Synced live with everyone' : ' Connecting\u2026'));
    app.appendChild(tag);
  }
  renderTabs(app);
  if(state.view==='setup') renderSetup(app);
  else if(state.view==='draft') renderDraft(app);
  else renderLeaderboard(app);
}

function renderTabs(app){
  var nav=el('nav',{class:'tabs'});
  [['setup','Setup'],['draft','Draft'],['leaderboard','Leaderboard']].forEach(function(t){
    var b=btn(t[1],function(){ state.view=t[0]; saveState(); render(); });
    if(state.view===t[0]) b.classList.add('active');
    nav.appendChild(b);
  });
  app.appendChild(nav);
}

function renderSetup(app){
  var card=el('div',{class:'card'});
  card.appendChild(el('label',{class:'field-label',text:'Players ('+state.players.length+'/'+NUM_PLAYERS+')'}));
  state.players.forEach(function(p,i){
    var row=el('div',{class:'list-row'});
    row.appendChild(el('span',{text:p}));
    var x=el('button',{class:'x-btn',text:'remove'});
    x.addEventListener('click',function(){ state.players.splice(i,1); saveState(); render(); });
    row.appendChild(x);
    card.appendChild(row);
  });
  if(state.players.length<NUM_PLAYERS){
    var prow=el('div',{class:'row-flex',style:'margin-top:8px'});
    var pinput=el('input',{type:'text',placeholder:'Player name'});
    var paddbtn=btn('Add',function(){
      var v=pinput.value.trim();
      if(v){ state.players.push(v); saveState(); render(); }
    });
    prow.appendChild(pinput); prow.appendChild(paddbtn);
    card.appendChild(prow);
    pinput.addEventListener('keydown',function(e){ if(e.key==='Enter'){ paddbtn.click(); } });
  }
  app.appendChild(card);

  var gcard=el('div',{class:'card'});
  gcard.appendChild(el('label',{class:'field-label',text:'Golfer pool ('+state.golfers.length+' / min '+(ROSTER_SIZE*NUM_PLAYERS)+', max '+MAX_GOLFERS+')'}));
  var glist=el('div',{class:'scrolly'});
  state.golfers.forEach(function(g,i){
    var row=el('div',{class:'list-row'});
    row.appendChild(el('span',{text:g}));
    var x=el('button',{class:'x-btn',text:'remove'});
    x.addEventListener('click',function(){ state.golfers.splice(i,1); saveState(); render(); });
    row.appendChild(x);
    glist.appendChild(row);
  });
  gcard.appendChild(glist);
  if(state.golfers.length<MAX_GOLFERS){
    var grow=el('div',{class:'row-flex',style:'margin-top:8px'});
    var ginput=el('input',{type:'text',placeholder:'Golfer name, e.g. Scottie Scheffler'});
    var gaddbtn=btn('Add',function(){
      var v=ginput.value.trim();
      if(v && state.golfers.indexOf(v)===-1 && state.golfers.length<MAX_GOLFERS){ state.golfers.push(v); saveState(); ginput.value=''; render(); ginput.focus(); }
    });
    grow.appendChild(ginput); grow.appendChild(gaddbtn);
    gcard.appendChild(grow);
    ginput.addEventListener('keydown',function(e){ if(e.key==='Enter'){ gaddbtn.click(); } });
  } else {
    gcard.appendChild(el('p',{class:'small-muted',text:'Pool is full at '+MAX_GOLFERS+' golfers. Remove one to add another.'}));
  }
  app.appendChild(gcard);

  var canStart = state.players.length===NUM_PLAYERS && state.golfers.length>=ROSTER_SIZE*NUM_PLAYERS;
  if(canStart && state.picks.length===0){
    app.appendChild(btn('Start snake draft',function(){ state.view='draft'; saveState(); render(); },'primary full'));
  } else if(!canStart){
    var need=Math.max(0, ROSTER_SIZE*NUM_PLAYERS-state.golfers.length);
    var msg = state.players.length<NUM_PLAYERS ? ('Add '+(NUM_PLAYERS-state.players.length)+' more player(s).') : (need>0 ? ('Add '+need+' more golfer(s) — need '+(ROSTER_SIZE*NUM_PLAYERS)+' total for '+ROSTER_SIZE+' picks per player.') : '');
    if(msg) app.appendChild(el('p',{class:'small-muted',text:msg}));
  }

  if(state.picks.length>0){
    app.appendChild(btn('Reset everything',function(){
      if(confirm('This clears players, golfers, and picks. Continue?')){
        state=defaultState(); saveState(); render();
      }
    },'danger full'));
  }
}

function renderDraft(app){
  if(state.players.length<NUM_PLAYERS || state.golfers.length<ROSTER_SIZE*NUM_PLAYERS){
    app.appendChild(el('p',{class:'small-muted',text:'Finish setup first — '+NUM_PLAYERS+' players and enough golfers.'}));
    return;
  }
  var order=snakeOrder(NUM_PLAYERS,ROSTER_SIZE);
  var idx=state.picks.length;
  var totalPicks=order.length;

  if(idx>=totalPicks){
    app.appendChild(el('p',{class:'serif-head',html:'Draft complete.',style:'font-size:18px;margin:0 0 12px'}));
  } else {
    var onClockIdx=order[idx];
    var round=Math.floor(idx/NUM_PLAYERS)+1;
    var pickInRound=(idx%NUM_PLAYERS)+1;
    var pc=el('div',{class:'pick-card'});
    pc.appendChild(el('p',{class:'eyebrow',text:'Round '+round+' \u00b7 Pick '+pickInRound}));
    pc.appendChild(el('p',{class:'onclock',text:state.players[onClockIdx]+' is on the clock'}));
    app.appendChild(pc);

    var taken=draftedNames();
    var available=state.golfers.filter(function(g){ return taken.indexOf(g)===-1; });
    var card=el('div',{class:'card'});
    var search=el('input',{type:'text',placeholder:'Search golfer'});
    card.appendChild(search);
    var list=el('div',{class:'scrolly',style:'margin-top:8px'});
    card.appendChild(list);
    app.appendChild(card);

    function renderList(filter){
      list.innerHTML='';
      available.filter(function(g){ return g.toLowerCase().indexOf(filter.toLowerCase())>-1; }).forEach(function(g){
        var b=el('button',{type:'button',class:'golfer-btn',text:g});
        b.addEventListener('click',function(){
          state.picks.push({player:state.players[onClockIdx], golfer:g});
          saveState(); render();
        });
        list.appendChild(b);
      });
    }
    renderList('');
    search.addEventListener('input',function(){ renderList(search.value); });
  }

  app.appendChild(el('label',{class:'field-label',text:'Rosters so far',style:'display:block;margin:14px 2px 8px'}));
  var grid=el('div',{class:'roster-grid'});
  state.players.forEach(function(p){
    var picksForP=state.picks.filter(function(pk){ return pk.player===p; }).map(function(pk){ return pk.golfer; });
    var rc=el('div',{class:'roster-card'});
    rc.appendChild(el('p',{class:'pname',text:p+' ('+picksForP.length+'/'+ROSTER_SIZE+')'}));
    picksForP.forEach(function(g){ rc.appendChild(el('p',{class:'gname',text:g})); });
    grid.appendChild(rc);
  });
  app.appendChild(grid);

  if(state.picks.length>0){
    app.appendChild(btn('Undo last pick',function(){ state.picks.pop(); saveState(); render(); },'full',true));
  }
}

function scoreFor(golferName){
  var key=normName(golferName);
  if(liveScores.hasOwnProperty(key)) return liveScores[key];
  return undefined;
}

function renderLeaderboard(app){
  var drafted=draftedNames();
  if(drafted.length===0){
    app.appendChild(el('p',{class:'small-muted',text:'Draft golfers first to see the leaderboard.'}));
    return;
  }

  var liveBar=el('div',{class:'row-flex',style:'margin-bottom:10px;justify-content:space-between'});
  var tag=el('span',{class:'live-tag'});
  tag.appendChild(el('span',{class:'live-dot'}));
  var statusText = liveError ? 'Live scores unavailable' : (liveTournamentName ? (liveTournamentName + (liveStatus? ' \u00b7 '+liveStatus:'')) : 'Loading live scores\u2026');
  tag.appendChild(document.createTextNode(' '+statusText));
  liveBar.appendChild(tag);
  var refreshBtn=btn('Refresh',function(){ fetchLiveScores(true); },'');
  refreshBtn.style.fontSize='12px';
  refreshBtn.style.padding='5px 10px';
  liveBar.appendChild(refreshBtn);
  app.appendChild(liveBar);

  // Tournament leader bonus
  var draftedSet={};
  drafted.forEach(function(g){ draftedSet[normName(g)]=g; });
  var lowest=null;
  for(var key in liveScores){
    if(lowest===null || liveScores[key] < liveScores[lowest.key]){
      lowest = { key:key, score:liveScores[key] };
    }
  }
  if(lowest){
    var leaderDisplayName = liveDisplayNames[lowest.key] || lowest.key;
    var owners = state.players.filter(function(p){
      return state.picks.some(function(pk){ return pk.player===p && normName(pk.golfer)===lowest.key; });
    });
    var banner=el('div',{class:'leader-banner'});
    banner.appendChild(el('p',{class:'eyebrow',text:'Leading the tournament'}));
    banner.appendChild(el('p',{class:'name',text:leaderDisplayName+' \u00b7 '+(lowest.score>0?'+':'')+lowest.score}));
    if(owners.length){
      var ownersWrap=el('div',{class:'owners'});
      owners.forEach(function(o){ ownersWrap.appendChild(el('span',{class:'owner-pill',text:o+' has the leader'})); });
      banner.appendChild(ownersWrap);
    } else {
      banner.appendChild(el('p',{class:'meta',text:'Not on anyone\u2019s roster'}));
    }
    app.appendChild(banner);
  }

  // Manual override scores card
  var manCard=el('div',{class:'card'});
  manCard.appendChild(el('label',{class:'field-label',text:'Drafted golfers'}));
  var mlist=el('div',{class:'scrolly'});
  drafted.forEach(function(g){
    var row=el('div',{class:'gscore-row'});
    row.appendChild(el('span',{text:g}));
    var sc=scoreFor(g);
    row.appendChild(el('span',{class:'sc',text: sc===undefined ? '\u2014' : ((sc>0?'+':'')+sc)}));
    mlist.appendChild(row);
  });
  manCard.appendChild(mlist);
  app.appendChild(manCard);

  // Team totals
  var results=state.players.map(function(p){
    var picksForP=state.picks.filter(function(pk){ return pk.player===p; }).map(function(pk){ return pk.golfer; });
    var scored=picksForP.map(function(g){ return { golfer:g, score:scoreFor(g) }; })
      .filter(function(x){ return x.score!==undefined; })
      .sort(function(a,b){ return a.score-b.score; });
    var top5=scored.slice(0,5);
    var total=top5.reduce(function(s,x){ return s+x.score; },0);
    return { player:p, top5:top5, total:total, countedAll: scored.length>=5, scoredCount: scored.length, rosterCount: picksForP.length };
  });
  results.sort(function(a,b){
    if(a.scoredCount===0 && b.scoredCount===0) return 0;
    if(a.scoredCount===0) return 1;
    if(b.scoredCount===0) return -1;
    return a.total-b.total;
  });

  app.appendChild(el('label',{class:'field-label',text:'Standings (lowest top-5 total wins)',style:'display:block;margin:14px 2px 8px'}));
  results.forEach(function(r,i){
    var card=el('div',{class:'lb-card'+(i===0 && r.scoredCount>0 ? ' first':'')});
    var head=el('div',{class:'lb-head'});
    head.appendChild(el('span',{class:'lb-rank',text:(i+1)+'. '+r.player}));
    var totalText = r.scoredCount===0 ? '\u2014' : ((r.total>0?'+':'')+r.total+(r.countedAll?'':' *'));
    head.appendChild(el('span',{class:'lb-total',text:totalText}));
    card.appendChild(head);
    var sub = r.top5.length ? r.top5.map(function(x){ return x.golfer+' '+(x.score>0?'+':'')+x.score; }).join(', ') : 'No scores yet';
    card.appendChild(el('p',{class:'lb-sub',text:sub}));
    app.appendChild(card);
  });
  if(results.some(function(r){ return !r.countedAll && r.scoredCount>0; })){
    app.appendChild(el('p',{class:'small-muted',text:'* fewer than 5 golfers have a live score yet, total reflects only those counted so far'}));
  }
}

var liveDisplayNames={};

function fetchLiveScores(manual){
  fetch(ESPN_URL).then(function(r){ return r.json(); }).then(function(data){
    liveError=null;
    liveFetchedAt=new Date();
    var scores={};
    var names={};
    var ev = data.events && data.events[0];
    if(ev){
      liveTournamentName = ev.name || '';
      var comp = ev.competitions && ev.competitions[0];
      if(comp){
        liveStatus = (comp.status && comp.status.type && comp.status.type.description) || '';
        (comp.competitors||[]).forEach(function(c){
          var nm = c.athlete && (c.athlete.displayName || c.athlete.fullName);
          if(!nm) return;
          var sc = c.score;
          var num = (sc==='E') ? 0 : parseInt(sc,10);
          if(!isNaN(num)){
            var key=normName(nm);
            scores[key]=num;
            names[key]=nm;
          }
        });
      }
    }
    liveScores=scores;
    liveDisplayNames=names;
    if(state.view==='leaderboard') render();
  }).catch(function(err){
    liveError=err;
    if(state.view==='leaderboard') render();
  });
}

loadState();
initFirebase();
render();
fetchLiveScores();
setInterval(fetchLiveScores, REFRESH_MS);
setTimeout(function(){ saveState(); }, 1500);
})();
</script>
